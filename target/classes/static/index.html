<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC - Control de Envases Vacíos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col text-center">
                <h1 class="display-5 fw-bold text-dark">🏭 SISTEMA DE GESTIÓN DE CALIDAD</h1>
                <p class="text-muted fs-5">Terminal de Alta e Impresión de Envases Vacíos — Planta Recuperadora</p>
                <hr class="my-4">
            </div>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm panel-industrial">
                    <div class="card-header bg-primary text-white py-3 text-center">
                        <h3 class="card-title mb-0 fs-4">Seleccione el Tipo de Contenedor a Dar de Alta</h3>
                    </div>
                    <div class="card-body p-4">
                        <div class="d-grid gap-3">
                            <button onclick="generarEnvase('ENV-01')" class="btn btn-outline-dark btn-industrial text-start">
                                📦 Alta Envase Tipo: <span class="badge bg-dark ms-2">ENV-01</span> <span class="desc-btn">(Bolsón Scrap Bruto)</span>
                            </button>
                            <button onclick="generarEnvase('ENV-02')" class="btn btn-outline-dark btn-industrial text-start">
                                📦 Alta Envase Tipo: <span class="badge bg-dark ms-2">ENV-02</span> <span class="desc-btn">(Bolsón Pellet Recuperado B/C)</span>
                            </button>
                            <button onclick="generarEnvase('ENV-03')" class="btn btn-outline-dark btn-industrial text-start">
                                📦 Alta Envase Tipo: <span class="badge bg-dark ms-2">ENV-03</span> <span class="desc-btn">(Bolsón Scrap Triturado B/C)</span>
                            </button>
                            <button onclick="generarEnvase('ENV-04')" class="btn btn-outline-dark btn-industrial text-start">
                                📦 Alta Envase Tipo: <span class="badge bg-dark ms-2">ENV-04</span> <span class="desc-btn">(Bolsón Triturado tortas de laminación)</span>
                            </button>
                            <button onclick="generarEnvase('ENV-05')" class="btn btn-outline-dark btn-industrial text-start">
                                📦 Alta Envase Tipo: <span class="badge bg-dark ms-2">ENV-05</span> <span class="desc-btn">(Pellet de Laminación)</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5 justify-content-center">
            <div class="col-md-8">
                <div id="panelLog" class="alert alert-secondary d-none shadow-sm" role="alert">
                    <h4 class="alert-heading fw-bold mb-2" id="logTitulo">Procesando...</h4>
                    <p class="mb-0 fs-5" id="logMensaje"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
